<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-pencil-square"></i> Edit</h4>
                </div>
                <div class="card-body">
                    <form method="post" action="/edit">
                        <input type="hidden" name="id" th:value="${book.id}">

                        <div class="mb-3">
                            <label class="form-label">Book ID</label>
                            <input type="text" class="form-control" th:value="${book.id}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" name="title" class="form-control" th:value="${book.title}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Author</label>
                            <input type="text" name="author" class="form-control" th:value="${book.author}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Publisher</label>
                            <input type="text" name="publisher" class="form-control" th:value="${book.publisher}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Price（¥）</label>
                            <input type="number" name="price" class="form-control" th:value="${book.price}" required min="0">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Stock number</label>
                            <input type="number" name="stock" class="form-control" th:value="${book.stock}" required min="0">
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Update
                            </button>
                            <button type="button" class="btn btn-secondary" onclick="location.href='/'">
                                <i class="bi bi-x-circle"></i> Cancel
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
