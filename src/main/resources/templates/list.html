<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">
        <i class="bi bi-book"></i> Book inventory management
    </h1>

    <!-- 検索フォーム -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Search</h5>
            <form method="get" action="/" class="row g-3">
                <div class="col-md-4">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" th:value="${searchTitle}" placeholder="％Like％">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Author</label>
                    <input type="text" name="author" class="form-control" th:value="${searchAuthor}" placeholder="％Like％">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-search"></i> Search
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="location.href='/'">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <span class="badge bg-info">Search result: <span th:text="${#lists.size(books)}"></span></span>
        </div>
        <button class="btn btn-success" onclick="location.href='/add'">
            <i class="bi bi-plus-circle"></i> Register
        </button>
    </div>

    <!-- テーブル -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Publisher</th>
                <th>Price</th>
                <th>Stock</th>
                <th style="width: 300px;">Edit</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publisher}"></td>
                <td th:text="'¥' + ${book.price}"></td>
                <td>
                            <span th:text="${book.stock}"
                                  th:class="${book.stock <= 3} ? 'badge bg-danger' : 'badge bg-success'"></span>
                </td>
                <td>
                    <!-- edit button -->
                    <form method="get" action="/edit" style="display:inline;">
                        <input type="hidden" name="id" th:value="${book.id}">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                    </form>

                    <!-- 削除ボタン -->
                    <form method="post" action="/delete" style="display:inline;"
                          onsubmit="return confirm('delete？');">
                        <input type="hidden" name="id" th:value="${book.id}">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </form>

                    <!-- Stock edit button -->
                    <div class="btn-group btn-group-sm" role="group">
                        <form method="post" action="/stock/increase" style="display:inline;">
                            <input type="hidden" name="id" th:value="${book.id}">
                            <input type="hidden" name="amount" value="1">
                            <button type="submit" class="btn btn-outline-success" title="stock+1">
                                <i class="bi bi-plus"></i>
                            </button>
                        </form>
                        <form method="post" action="/stock/decrease" style="display:inline;">
                            <input type="hidden" name="id" th:value="${book.id}">
                            <input type="hidden" name="amount" value="1">
                            <button type="submit" class="btn btn-outline-warning" title="stock-1">
                                <i class="bi bi-dash"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
