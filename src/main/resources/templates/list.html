<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-4">
        <i class="bi bi-book"></i> Book inventory management
    </h1>

    <!-- 検索フォーム -->
    <div class="card mb-4">
        <div class="card-body">
            <h5 class="card-title">Search</h5>
            <form method="get" action="/" class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" class="form-control" th:value="${searchTitle}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Author</label>
                    <input type="text" name="author" class="form-control" th:value="${searchAuthor}">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select">
                        <option value="">All</option>
                        <option value="novel" th:selected="${searchCategory == 'novel'}">novel</option>
                        <option value="business" th:selected="${searchCategory == 'business'}">business</option>
                        <option value="technical" th:selected="${searchCategory == 'technical'}">technical</option>
                        <option value="practical" th:selected="${searchCategory == 'practical'}">practical</option>
                        <option value="essay" th:selected="${searchCategory == 'essay'}">essay</option>
                        <option value="others" th:selected="${searchCategory == 'others'}">others</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-search"></i> Search
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="location.href='/'">
                        <i class="bi bi-x-circle"></i> Clear
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <span class="badge bg-info">Search result: <span th:text="${#lists.size(books)}"></span></span>
        </div>
        <button class="btn btn-warning me-2" onclick="location.href='/purchases'">
            <i class="bi bi-box-seam"></i> Purchase History
        </button>
        <button class="btn btn-info me-2" onclick="location.href='/sales'">
            <i class="bi bi-graph-up"></i> Sales History
        </button>
        <button class="btn btn-success" onclick="location.href='/add'">
            <i class="bi bi-plus-circle"></i> Register
        </button>
    </div>

    <!-- テーブル -->
    <div class="table-responsive">
        <table class="table table-striped table-hover">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Publisher</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th style="width: 300px;">Edit</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.id}"></td>
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.publisher}"></td>
                <td>
                    <span class="badge bg-secondary" th:text="${book.category}"></span>
                </td>
                <td th:text="'¥' + ${book.price}"></td>
                <td>
                            <span th:text="${book.stock}"
                                  th:class="${book.stock <= 3} ? 'badge bg-danger' : 'badge bg-success'"></span>
                </td>
                <td>
                    <!-- sales button -->
                    <button type="button" class="btn btn-sm btn-success"
                            data-bs-toggle="modal"
                            th:data-bs-target="'#sellModal' + ${book.id}">
                        <i class="bi bi-cart-check"></i> Sell
                    </button>
                    <!-- Purchase button -->
                    <button type="button" class="btn btn-sm btn-warning"
                            data-bs-toggle="modal"
                            th:data-bs-target="'#purchaseModal' + ${book.id}">
                        <i class="bi bi-box-seam"></i> Purchase
                    </button>
                    <!-- edit button -->
                    <form method="get" action="/edit" style="display:inline;">
                        <input type="hidden" name="id" th:value="${book.id}">
                        <button type="submit" class="btn btn-sm btn-primary">
                            <i class="bi bi-pencil"></i> Edit
                        </button>
                    </form>

                    <!-- delete button -->
                    <form method="post" action="/delete" style="display:inline;"
                          onsubmit="return confirm('delete？');">
                        <input type="hidden" name="id" th:value="${book.id}">
                        <button type="submit" class="btn btn-sm btn-danger">
                            <i class="bi bi-trash"></i> Delete
                        </button>
                    </form>

                    <!-- Stock edit button -->
                    <div class="btn-group btn-group-sm" role="group">
                        <form method="post" action="/stock/increase" style="display:inline;">
                            <input type="hidden" name="id" th:value="${book.id}">
                            <input type="hidden" name="amount" value="1">
                            <button type="submit" class="btn btn-outline-success" title="stock+1">
                                <i class="bi bi-plus"></i>
                            </button>
                        </form>
                        <form method="post" action="/stock/decrease" style="display:inline;">
                            <input type="hidden" name="id" th:value="${book.id}">
                            <input type="hidden" name="amount" value="1">
                            <button type="submit" class="btn btn-outline-warning" title="stock-1">
                                <i class="bi bi-dash"></i>
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <!-- sales modal（for books） -->
    <div th:each="book : ${books}">
        <div class="modal fade" th:id="'sellModal' + ${book.id}" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white">
                        <h5 class="modal-title">
                            <i class="bi bi-cart-check"></i> Sell Book
                        </h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <form method="post" action="/sell">
                        <div class="modal-body">
                            <input type="hidden" name="id" th:value="${book.id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Title</label>
                                <p th:text="${book.title}"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Price</label>
                                <p th:text="'¥' + ${book.price}"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Current Stock</label>
                                <p th:text="${book.stock} + ' books'"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Quantity to Sell</label>
                                <input type="number" name="quantity" class="form-control"
                                       min="1" th:max="${book.stock}" value="1" required>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-success">
                                <i class="bi bi-check-circle"></i> Sell
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- purchases modal（for books） -->>
        <div class="modal fade" th:id="'purchaseModal' + ${book.id}" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-warning text-dark">
                        <h5 class="modal-title">
                            <i class="bi bi-box-seam"></i> Purchase Book
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <form method="post" action="/purchase">
                        <div class="modal-body">
                            <input type="hidden" name="id" th:value="${book.id}">

                            <div class="mb-3">
                                <label class="form-label fw-bold">Title</label>
                                <p th:text="${book.title}"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Selling Price</label>
                                <p th:text="'¥' + ${book.price}"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Current Stock</label>
                                <p th:text="${book.stock} + ' books'"></p>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Quantity to Purchase</label>
                                <input type="number" name="quantity" class="form-control"
                                       min="1" value="10" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Unit Purchase Price (¥)</label>
                                <input type="number" name="unitPrice" class="form-control"
                                       min="1" value="500" required>
                                <small class="text-muted">Purchase price per book (wholesale price)</small>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-check-circle"></i> Purchase
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
