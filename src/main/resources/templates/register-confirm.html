<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm to sign up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 400px">
    <h2>Confirm of context</h2>
    <div class="card mb-4">
        <div class="card-body">
            <p><strong>User name：</strong><span th:text="${username}"></span></p>
            <p><strong>Password：</strong>••••••••</p>
        </div>
    </div>
    <!-- 確認画面からパスワードを引き継ぐためhiddenで送信 -->
    <form th:action="@{/register/complete}" method="post">
        <input type="hidden" name="username" th:value="${username}">
        <input type="hidden" name="password" th:value="${password}">
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">sign up with this</button>
            <a th:href="@{/register}" class="btn btn-secondary">Back</a>
        </div>
    </form>
</div>
</body>
</html>
