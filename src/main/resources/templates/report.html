<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="bi bi-bar-chart-fill"></i> Sales & Profit Report
        </h1>
        <button class="btn btn-secondary" onclick="location.href='/'">
            <i class="bi bi-arrow-left"></i> Back to List
        </button>
    </div>

    <!-- Summary -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-graph-up-arrow"></i> Total Sales
                    </h5>
                    <h2 class="mb-0">¥<span th:text="${#numbers.formatInteger(totalSales, 0, 'COMMA')}"></span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-warning text-dark">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-box-seam"></i> Total Purchases
                    </h5>
                    <h2 class="mb-0">¥<span th:text="${#numbers.formatInteger(totalPurchases, 0, 'COMMA')}"></span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white" th:classappend="${profit >= 0} ? 'bg-primary' : 'bg-danger'">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-cash-coin"></i> Profit
                    </h5>
                    <h2 class="mb-0">¥<span th:text="${#numbers.formatInteger(profit, 0, 'COMMA')}"></span></h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Chart -->
    <div class="row">
        <!-- Sales by monthly -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-pie-chart-fill"></i> Sales by Category</h5>
                </div>
                <div class="card-body">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Sales performance by monthly -->
        <div class="col-md-6 mb-4">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="bi bi-graph-up"></i> Monthly Sales Performance</h5>
                </div>
                <div class="card-body">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Sales table by category -->
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-table"></i> Category Sales Details</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Category</th>
                        <th>Total Sales</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categorySales}">
                        <td>
                            <span class="badge bg-secondary" th:text="${cat[0]}"></span>
                        </td>
                        <td>
                            <strong th:text="'¥' + ${#numbers.formatInteger(cat[1], 0, 'COMMA')}"></strong>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorySales)}">
                        <td colspan="2" class="text-center text-muted py-4">
                            No sales data available
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    // Sales by category
    const categoryData = /*[[${categorySales}]]*/ [];
    const categoryLabels = categoryData.map(item => item[0]);
    const categoryValues = categoryData.map(item => item[1]);

    // Sales by monthly
    const monthlyData = /*[[${monthlySales}]]*/ [];
    const monthlyLabels = monthlyData.map(item => item[0] + '-' + String(item[1]).padStart(2, '0'));
    const monthlyValues = monthlyData.map(item => item[2]);

    // Sales by category pie chart
    const categoryCtx = document.getElementById('categoryChart').getContext('2d');
    new Chart(categoryCtx, {
        type: 'pie',
        data: {
            labels: categoryLabels,
            datasets: [{
                data: categoryValues,
                backgroundColor: [
                    '#FF6384',
                    '#36A2EB',
                    '#FFCE56',
                    '#4BC0C0',
                    '#9966FF',
                    '#FF9F40'
                ]
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'bottom'
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.label + ': ¥' + context.parsed.toLocaleString();
                        }
                    }
                }
            }
        }
    });

    // 月別売上推移折れ線グラフ
    const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
    new Chart(monthlyCtx, {
        type: 'line',
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: 'Sales (¥)',
                data: monthlyValues,
                borderColor: '#36A2EB',
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                tension: 0.3,
                fill: true
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true,
                    position: 'bottom'
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return 'Sales: ¥' + context.parsed.y.toLocaleString();
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) {
                            return '¥' + value.toLocaleString();
                        }
                    }
                }
            }
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
