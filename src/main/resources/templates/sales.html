<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sales History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="bi bi-graph-up"></i> Sales History
        </h1>
        <button class="btn btn-secondary" onclick="location.href='/'">
            <i class="bi bi-arrow-left"></i> Back to List
        </button>
    </div>

    <!-- Tosay's amount -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card bg-success text-white">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-calendar-check"></i> Today's Total Sales
                    </h5>
                    <h2 class="mb-0">¥<span th:text="${#numbers.formatInteger(todayTotal, 0, 'COMMA')}"></span></h2>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card bg-info text-white">
                <div class="card-body">
                    <h5 class="card-title">
                        <i class="bi bi-receipt"></i> Total Records
                    </h5>
                    <h2 class="mb-0"><span th:text="${#lists.size(salesList)}"></span> records</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- Table - Sales history -->
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-list-ul"></i> Sales Records</h5>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Sale Date</th>
                        <th>Book Title</th>
                        <th>Quantity</th>
                        <th>Unit Price</th>
                        <th>Total Price</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sale : ${salesList}">
                        <td th:text="${sale.id}"></td>
                        <td th:text="${#temporals.format(sale.saleDate, 'yyyy-MM-dd HH:mm')}"></td>
                        <td th:text="${sale.bookTitle}"></td>
                        <td>
                            <span class="badge bg-primary" th:text="${sale.quantity} + ' books'"></span>
                        </td>
                        <td th:text="'¥' + ${#numbers.formatInteger(sale.unitPrice, 0, 'COMMA')}"></td>
                        <td>
                            <strong th:text="'¥' + ${#numbers.formatInteger(sale.totalPrice, 0, 'COMMA')}"></strong>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(salesList)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                            <p class="mb-0">No sales records yet</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
